version: '3.8'

services:
  moss:
    build: .
    container_name: moss_agent
    environment:
      - MOSS_MODE=safe
      - MOSS_AGENT_ID=moss_docker
      - PYTHONUNBUFFERED=1
    volumes:
      - ./logs:/app/logs
      - ./data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python3", "-c", "print('healthy')"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Optional: Redis for distributed MOSS
  redis:
    image: redis:7-alpine
    container_name: moss_redis
    volumes:
      - redis_data:/data
    restart: unless-stopped
    profiles:
      - distributed

volumes:
  redis_data:
