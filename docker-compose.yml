version: '3.8'

services:
  moss-openclaw:
    image: moss-openclaw:latest
    container_name: moss-openclaw
    restart: unless-stopped
    mem_limit: 4g
    memswap_limit: 4g
    pids_limit: 256
    cpu_shares: 512
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./experiments:/app/experiments
    environment:
      - OPENCLAW_HEADLESS=true
      - OPENCLAW_RESOURCE_BLOCKING=true
      - MOSS_PURPOSE_INTERVAL=2000
    networks:
      - moss-network

  moss-agent:
    build: .
    container_name: moss-agent
    restart: unless-stopped
    mem_limit: 2g
    memswap_limit: 2g
    depends_on:
      - moss-openclaw
    volumes:
      - .:/workspace/projects/moss
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - MOSS_MODE=real_world
      - MOSS_EXPERIMENT_DURATION=72h
    networks:
      - moss-network

networks:
  moss-network:
    driver: bridge