version: '3.8'

services:
  moss:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    volumes:
      - ./experiments/results:/app/experiments/results
    environment:
      - PYTHONUNBUFFERED=1
    command: python experiments/collab_100agents.py --agents 100 --iterations 100

  moss-dev:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    volumes:
      - .:/app
      - ./experiments/results:/app/experiments/results
    environment:
      - PYTHONUNBUFFERED=1
    command: python -m pytest tests/ -v
