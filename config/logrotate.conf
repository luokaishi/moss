# MOSS实验日志轮转配置
# 每天轮转一次，保留7天

/workspace/projects/moss/experiments/*.jsonl {
    daily
    rotate 7
    compress
    delaycompress
    missingok
    notifempty
    create 644 root root
    dateext
    dateformat -%Y%m%d-%s
}

/workspace/projects/moss/experiments/*.log {
    daily
    rotate 7
    compress
    delaycompress
    missingok
    notifempty
    create 644 root root
}

/workspace/projects/moss/logs/*.log {
    daily
    rotate 14
    compress
    delaycompress
    missingok
    notifempty
    create 644 root root
}
